name: Daily Crypto News Fetch

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00（台灣時間早上 8 點）執行
  workflow_dispatch: {}  # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install -r requirements.txt

      - run: python fetch_news.py

      - name: Commit updated crypto_news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto_news.json
          git diff --staged --quiet || git commit -m "chore: update crypto_news.json"
          git push
